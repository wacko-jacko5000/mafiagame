services:
  postgres:
    image: postgres:16-alpine
    container_name: mafia_game_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mafia_game
      POSTGRES_USER: mafia_game
      POSTGRES_PASSWORD: mafia_game
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mafia_game -d mafia_game"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
