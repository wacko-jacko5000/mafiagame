databases:
  - name: mafiagame-db
    plan: basic-256mb

services:
  - type: web
    name: mafiagame-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @mafia-game/api run prisma:generate
    preDeployCommand: pnpm --filter @mafia-game/api run prisma:migrate:deploy
    startCommand: pnpm --filter @mafia-game/api run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mafiagame-db
          property: connectionString

  - type: web
    name: mafiagame-web
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @mafia-game/web run build
    startCommand: pnpm --filter @mafia-game/web exec next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_ORIGIN
        value: https://mafiagame-api.onrender.com

  - type: web
    name: mafiagame-web-neo
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @mafia-game/web-neo run build
    startCommand: pnpm --filter @mafia-game/web-neo exec next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_ORIGIN
        value: https://mafiagame-api.onrender.com
